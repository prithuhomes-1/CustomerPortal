<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <script defer src="./assets/vendor/msal-browser.min.js"></script>
  <script defer src="./config.js"></script>
  <script defer src="./components.js"></script>
  <script defer src="./apiService.js"></script>
  <script defer src="./product-selection.js"></script>
</head>
<body id="top">
  <div data-portal-component="navbar"></div>

  <main class="product-selection-page">
    <div class="container">
      <section class="space-selection-panel">
        <button id="space-selection-toggle" class="space-selection-toggle" type="button" aria-expanded="true">
          <span id="space-selection-title"></span>
          <span id="space-selection-arrow" class="space-selection-arrow">&#9662;</span>
        </button>
        <div id="space-selection-body" class="space-selection-body">
          <div class="space-selection-table-wrap">
            <table class="space-selection-table">
              <thead>
                <tr>
                  <th id="ss-col-space"></th>
                  <th id="ss-col-space-type"></th>
                  <th id="ss-col-space-category"></th>
                  <th id="ss-col-due-date"></th>
                  <th id="ss-col-customer-selection"></th>
                  <th id="ss-col-product-set"></th>
                  <th id="ss-col-actions"></th>
                </tr>
              </thead>
              <tbody id="space-selection-rows"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="product-filter-panel">
        <div class="product-filter-header">
          <h1 id="ps-title"></h1>
          <p id="ps-subtitle"></p>
        </div>
        <div class="product-filter-grid">
          <div class="filter-field">
            <label id="label-category" for="filter-category"></label>
            <select id="filter-category"></select>
          </div>
          <div class="filter-field">
            <label id="label-space-category" for="filter-space-category"></label>
            <select id="filter-space-category"></select>
          </div>
          <div class="filter-field">
            <label id="label-product-set" for="filter-product-set"></label>
            <select id="filter-product-set"></select>
          </div>
          <div class="filter-action">
            <button id="add-compare-btn" type="button" class="btn btn-primary"></button>
          </div>
        </div>
      </section>

      <div id="ps-status" class="product-status"></div>
      <section id="ps-cards" class="product-card-grid"></section>
      <section class="compare-toolbar">
        <div id="selected-sets-label" class="compare-count"></div>
        <div id="selected-sets-chips" class="compare-chips"></div>
        <div class="compare-toolbar-actions">
          <button id="clear-compare-btn" type="button" class="btn btn-outline"></button>
          <button id="run-compare-btn" type="button" class="btn btn-primary"></button>
        </div>
      </section>
      <section id="compare-results" class="compare-results hidden"></section>
      <div class="project-panel error hidden" id="error-panel">
        <pre id="error-view"></pre>
      </div>
    </div>
  </main>

  <div data-portal-component="footer"></div>
</body>
</html>
